<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>마니또 제출</title>

<style>

body{
 font-family:sans-serif;
 background:#ffe6f0;
 text-align:center;
 margin:0;
 padding:0;
}

.box{
 width:420px;
 margin:60px auto;
 background:white;
 padding:30px;
 border-radius:20px;
 box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

input{
 padding:10px;
 border-radius:12px;
 border:1px solid #ffb6d5;
 font-size:16px;
 outline:none;
}

button{
 padding:10px 15px;
 border:none;
 border-radius:14px;
 background:#ff8fc2;
 color:white;
 cursor:pointer;
}

button:hover{
 background:#ff6fb1;
}

table{
 margin:auto;
 border-collapse:collapse;
}

td,th{
 border:1px solid #ffb6d5;
 padding:6px;
}

.hidden{
 display:none;
}

</style>
</head>
<body>


<div class="box" id="submitBox">

<h2>마니또 제출</h2>

번호<br>
<input id="num"><br><br>

내 마니또 이름<br>
<input id="target"><br><br>

<button onclick="send()">제출</button>

<br><br>

<button onclick="admin()">관리자</button>

</div>



<div class="box hidden" id="adminBox">

<h2>결과</h2>

<table id="table">

<tr>
<th>번호</th>
<th>마니또</th>
</tr>

</table>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
 getFirestore,
 collection,
 addDoc,
 getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyBhqymDUjLebm6UsTtEZlS100MmHJRZyXI",
  authDomain: "manito-dddc2.firebaseapp.com",
  projectId: "manito-dddc2",
  storageBucket: "manito-dddc2.firebasestorage.app",
  messagingSenderId: "108294275123",
  appId: "1:108294275123:web:cc58358e3eab047ad32346",
  measurementId: "G-9M3L7S05MK"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);



/* 제출 */

window.send = async function(){

let num = document.getElementById("num").value
let target = document.getElementById("target").value

if(!num || !target){
 alert("입력")
 return
}

await addDoc(collection(db,"manito"),{
 num:num,
 target:target
})

alert("저장됨")

}



/* 관리자 */

window.admin = async function(){

let pw = prompt("암호")

if(pw != "admin") return

document.getElementById("submitBox").classList.add("hidden")
document.getElementById("adminBox").classList.remove("hidden")

let snap = await getDocs(collection(db,"manito"))

let table = document.getElementById("table")

snap.forEach(doc=>{

let d = doc.data()

let tr = document.createElement("tr")

let td1 = document.createElement("td")
td1.innerText = d.num

let td2 = document.createElement("td")
td2.innerText = d.target

tr.appendChild(td1)
tr.appendChild(td2)

table.appendChild(tr)

})

}

</script>

</body>
</html>
